name: 🐛 버그 신고
description: 앱이 동작하지 않거나 이상하게 동작할 때
title: "[버그] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 신고해 주셔서 감사합니다. 아래 항목을 채워주시면 빠르게 해결할 수 있어요.

  - type: textarea
    id: what-happened
    attributes:
      label: 무슨 일이 일어났나요?
      description: 어떤 작업을 했고, 어떤 결과가 나왔는지 알려주세요.
      placeholder: |
        예) YouTube 링크를 붙여넣고 "MP3 다운로드" 버튼을 눌렀더니 ...
    validations:
      required: true

  - type: input
    id: youtube-url
    attributes:
      label: 어떤 영상에서 문제가 발생했나요? (선택)
      description: 같은 영상으로 재현해보면 원인을 빨리 찾을 수 있어요. 공개하기 곤란하면 비워두셔도 됩니다.
      placeholder: https://www.youtube.com/watch?v=...

  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - Windows 10
        - Windows 11
        - macOS (Apple Silicon · M1/M2/M3/M4)
        - macOS (Intel)
        - 기타
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 앱 버전
      description: 어느 릴리스를 받으셨는지 알려주세요 (예 v1.0.0).
      placeholder: v1.0.0
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: 앱 화면 하단의 "활동 로그" 내용 (선택)
      description: 빨간색 오류 메시지가 있다면 복사해서 붙여넣어 주세요.
      render: shell
